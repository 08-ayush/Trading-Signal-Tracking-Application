services:
  postgres:
    image: postgres:16-alpine
    container_name: trading-signals-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: trading_local
      POSTGRES_DB: trading_signals
    ports:
      - "5432:5432"
    volumes:
      - trading_signals_pgdata:/var/lib/postgresql/data

volumes:
  trading_signals_pgdata:
